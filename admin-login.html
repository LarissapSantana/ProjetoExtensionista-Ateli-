<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="style.css">
    <title>Painel Administrativo - Ateliê</title>
</head>
<body class="admin-login-body">

    <div class="admin-card">
        <img src="img/logo.png" alt="Logo Ateliê">
        <h2>Acesso Restrito</h2>
        
        <form action="/dashboard-admin" method="POST">
            <div class="form-acesso active" style="padding: 0;">
                <input type="email" placeholder="E-mail Administrativo" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit" class="btn-acao">Entrar</button>
            </div>
        </form>

        <a href="index.html" class="voltar-site">← Voltar para o site</a>
    </div>

</body>
</html>
