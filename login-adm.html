<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="style.css">
    <title>Administrativo - Ateliê</title>
</head>
<body class="admin-login-body">

    <div class="admin-card">
        <img src="img/logo.png" alt="Logo Ateliê">
        <h2>Acesso Restrito</h2>
        
        <form id="formAdmin" action="painel-adm.html" method="GET">
            <div class="form-acesso active">
                <input type="email" id="emailAdmin" placeholder="E-mail Administrativo" required>
                <input type="password" id="senhaAdmin" placeholder="Senha" required>
                <button type="submit" class="btn-loginadm">Entrar</button>
            </div>
        </form>

        <a href="index.html" class="voltar-site">← Voltar para o site</a>
    </div>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
