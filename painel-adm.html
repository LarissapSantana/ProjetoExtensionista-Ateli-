<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="style.css">
    <title>Painel de Pedidos - Ateliê</title>
    <style>
        /* Layout do Quadro de Pedidos Separados */
        .quadro-pedidos {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .coluna-pedidos {
            flex: 1;
            min-width: 300px;
            background-color: #fff;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid #ccc;
        }

        /* Cores exclusivas para o topo de cada coluna */
        .coluna-pedidos.pendentes { border-top-color: #fb3f3f; }
        .coluna-pedidos.producao { border-top-color: #f1b814; }
        .coluna-pedidos.entregues { border-top-color: #2ecc71; }

        .coluna-pedidos h3 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .contador-pedidos {
            background-color: #eee;
            color: #666;
            font-size: 0.85rem;
            padding: 2px 8px;
            border-radius: 12px;
        }

        /* Estilo dos Cards de cada Pedido */
        .card-pedido {
            background-color: var(--terceiro, #f7f5f1);
            border: 1px solid #e9e3eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }

        .card-pedido:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--secundaria, #8d279b);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .card-cliente {
            font-size: 1rem;
            color: #333;
            margin-bottom: 5px;
        }

        .card-produtos {
            font-size: 0.9rem;
            color: #555;
            background: #fff;
            padding: 8px;
            border-radius: 5px;
            margin: 8px 0;
            border-left: 3px solid var(--primaria, #e1b7ef);
        }

        /* Badges de Estado Financeiro */
        .badge-financeiro {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 5px;
        }
        .financeiro-aberto { background-color: #ffeeba; color: #856404; }
        .financeiro-pago { background-color: #d4edda; color: #155724; }

        .card-footer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }

        .footer-linha-1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-valor {
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
        }

        .footer-controles {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }

        /* Estilos dos Seletores dentro do Card */
        .select-card {
            flex: 1;
            padding: 5px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid #ccc;
            cursor: pointer;
            outline: none;
            background-color: #fff;
        }
        
        .select-pagamento-status.aberto { border-color: #f1b814; color: #856404; }
        .select-pagamento-status.pago { border-color: #2ecc71; color: #155724; }
    </style>
</head>
<body>

    <header class="admin-header">
        <div class="admin-logo">
            <img src="img/logo.png" alt="Logo">
            <span>Painel Administrativo</span>
        </div>
        <a href="login-adm.html" class="btn-logout">Sair do painel</a>
    </header>

    <main class="main-panel">
        <h2 style="text-align: left; border: none;">Gerenciamento de Pedidos</h2>
        
        <div class="quadro-pedidos">
            
            <div class="coluna-pedidos pendentes">
                <h3>Pendentes <span class="contador-pedidos" id="qtd-pendentes">0</span></h3>
                <div id="lista-pendentes">
                    <p style="text-align: center; color: #999; padding: 10px;">Nenhum pedido pendente</p>
                </div>
            </div>

            <div class="coluna-pedidos producao">
                <h3>Em Produção <span class="contador-pedidos" id="qtd-producao">0</span></h3>
                <div id="lista-producao">
                    <p style="text-align: center; color: #999; padding: 10px;">Nenhum pedido em andamento</p>
                </div>
            </div>

            <div class="coluna-pedidos entregues">
                <h3>Entregues <span class="contador-pedidos" id="qtd-entregues">0</span></h3>
                <div id="lista-entregues">
                    <p style="text-align: center; color: #999; padding: 10px;">Nenhum pedido entregue</p>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { db } from './firebase-config.js';

        const conteineres = {
            "Pendente": document.getElementById('lista-pendentes'),
            "Em Produção": document.getElementById('lista-producao'),
            "Entregue": document.getElementById('lista-entregues')
        };

        const contadores = {
            "Pendente": document.getElementById('qtd-pendentes'),
            "Em Produção": document.getElementById('qtd-producao'),
            "Entregue": document.getElementById('qtd-entregues')
        };

        const q = query(collection(db, "pedidos"), orderBy("dataPedido", "desc"));

        onSnapshot(q, (snapshot) => {
            Object.values(conteineres).forEach(c => c.innerHTML = "");
            Object.values(contadores).forEach(c => c.textContent = "0");

            let contagem = { "Pendente": 0, "Em Produção": 0, "Entregue": 0 };

            snapshot.forEach((docSnap) => {
                const pedido = docSnap.data();
                const idDocumento = docSnap.id;
                const idCurto = `#${idDocumento.substring(0, 5).toUpperCase()}`;
                
                const statusAtual = conteineres[pedido.status] ? pedido.status : "Pendente";
                
                // Pega o status do pagamento ou define como "Em Aberto" se for um pedido antigo
                const statusPagamento = pedido.situacaoPagamento || "Em Aberto";

                let pagamentoTexto = pedido.formaPagamento;
                if(pedido.formaPagamento === "Retirada") pagamentoTexto = "Retirada ";
                if(pedido.formaPagamento === "Pix") pagamentoTexto = "Pix ";
                if(pedido.formaPagamento === "Cartao_Credito") pagamentoTexto = "Crédito ";
                if(pedido.formaPagamento === "Cartao_Debito") pagamentoTexto = "Débito ";

                contagem[statusAtual]++;

                const card = document.createElement('div');
                card.className = "card-pedido";
                card.innerHTML = `
                    <div class="card-header">
                        <span>${idCurto}</span>
                        <span style="font-size: 0.8rem; font-weight: normal; color: #666;">
                            ${pedido.dataPedido ? new Date(pedido.dataPedido.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}
                        </span>
                    </div>
                    <div class="card-cliente">
                        <strong>${pedido.clienteNome}</strong>
                    </div>
                    <div style="font-size: 0.85rem; color: #444; margin-top: 5px;">
                        <strong>Forma:</strong> ${pagamentoTexto}
                        <br>
                        <span class="badge-financeiro ${statusPagamento === 'Pago' ? 'financeiro-pago' : 'financeiro-aberto'}">
                            ${statusPagamento === 'Pago' ? '✓ Pago' : '⚠ Em Aberto'}
                        </span>
                    </div>
                    
                    <div class="card-produtos">${pedido.produtosDescricao}</div>
                    
                    ${pedido.observacoes && pedido.observacoes !== "Nenhuma" ? 
                        `<div style="font-size: 0.8rem; color: #8d279b; font-style: italic; margin-bottom: 10px;">
                            Obs: ${pedido.observacoes}
                         </div>` : ''
                    }

                    <div class="card-footer">
                        <div class="footer-linha-1">
                            <span style="font-size: 0.8rem; color: #666;">Total:</span>
                            <div class="card-valor">R$ ${Number(pedido.valorTotal).toFixed(2).replace('.', ',')}</div>
                        </div>
                        
                        <div class="footer-controles">
                            <select class="select-card" onchange="window.alterarStatusPedido('${idDocumento}', this)">
                                <option value="Pendente" ${statusAtual === "Pendente" ? "selected" : ""}>Pendente</option>
                                <option value="Em Produção" ${statusAtual === "Em Produção" ? "selected" : ""}>Em Produção</option>
                                <option value="Entregue" ${statusAtual === "Entregue" ? "selected" : ""}>Entregue</option>
                            </select>

                            <select class="select-card select-pagamento-status ${statusPagamento === 'Pago' ? 'pago' : 'aberto'}" onchange="window.alterarPagamentoPedido('${idDocumento}', this)">
                                <option value="Em Aberto" ${statusPagamento === "Em Aberto" ? "selected" : ""}>Em Aberto</option>
                                <option value="Pago" ${statusPagamento === "Pago" ? "selected" : ""}>Pago</option>
                            </select>
                        </div>
                    </div>
                `;

                conteineres[statusAtual].appendChild(card);
            });

            Object.keys(contadores).forEach(status => {
                contadores[status].textContent = contagem[status];
                if (contagem[status] === 0) {
                    let msg = "Nenhum pedido pendente";
                    if(status === "Em Produção") msg = "Nenhum em andamento";
                    if(status === "Entregue") msg = "Nenhum pedido entregue";
                    conteineres[status].innerHTML = `<p style="text-align: center; color: #999; padding: 20px; font-size: 0.9rem;">${msg}</p>`;
                }
            });

        }, (erro) => {
            console.error("Erro ao carregar colunas do painel:", erro);
        });

        // Modifica o status de produção (Move entre as colunas)
        window.alterarStatusPedido = async function(idDoc, elementoSelect) {
            const novoStatus = elementoSelect.value;
            const pedidoRef = doc(db, "pedidos", idDoc);
            try {
                await updateDoc(pedidoRef, { status: novoStatus });
            } catch (erro) {
                console.error("Erro ao atualizar status:", erro);
                alert("Não foi possível mover o pedido.");
            }
        };

        // Modifica a situação financeira (Em Aberto / Pago)
        window.alterarPagamentoPedido = async function(idDoc, elementoSelect) {
            const novaSituacao = elementoSelect.value;
            const pedidoRef = doc(db, "pedidos", idDoc);
            try {
                await updateDoc(pedidoRef, { situacaoPagamento: novaSituacao });
            } catch (erro) {
                console.error("Erro ao atualizar situação financeira:", erro);
                alert("Não foi possível atualizar o status do pagamento.");
            }
        };
    </script>
</body>
</html>
